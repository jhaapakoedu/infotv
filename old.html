<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Märsky Info-TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html { 
      height: 100vh; width: 100vw;
      background-color: #020617;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
      overflow: hidden; color: #f8fafc; 
    }
    
    #header { 
      position: absolute; top: 0; width: 100%; height: 80px; 
      background: rgba(2, 6, 23, 0.8);
      display: flex; align-items: center; justify-content: space-between; 
      padding: 0 60px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .title { 
      font-size: 1.5rem; font-weight: 500; letter-spacing: 3px; 
      color: #f8fafc; white-space: nowrap; 
    }

    #ticker-container {
      flex-grow: 1; overflow: hidden; margin: 0 40px; display: none;
      background: transparent; 
      height: 100%; align-items: center; position: relative;
    }
    
    .ticker-text {
      white-space: nowrap; font-size: 1.6rem; font-weight: 500; letter-spacing: 2px; 
      color: #f87171; text-transform: uppercase;
      position: absolute;
      animation: ticker 30s linear infinite; 
    }
    @keyframes ticker { 0% { left: 100%; } 100% { left: -300%; } }
    
    #clock { font-size: 1.5rem; font-weight: 300; letter-spacing: 1px; color: #94a3b8; white-space: nowrap; }
    
    #slides-container { 
      width: 100%; height: calc(100vh - 80px); 
      margin-top: 80px; position: relative; 
    }
    
    .view-slide {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; visibility: hidden; transition: opacity 0.6s ease;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    }
    .view-slide.active { opacity: 1; visibility: visible; z-index: 10; }
    
    .content { 
      background: rgba(30, 41, 59, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin: 0 auto; padding: 70px 90px; border-radius: 24px; width: 88%; max-width: 1700px; 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    h1 { 
      font-size: 2.8rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; 
      color: #f8fafc; border-bottom: 1px solid rgba(255,255,255,0.1); 
      padding-bottom: 25px; margin-bottom: 50px; 
    }

    /* RUOKALISTA */
    .menu-grid { display: flex; justify-content: space-between; }
    .day-col { flex: 1; margin: 0 40px; }
    .day-col:first-child { margin-left: 0; }
    .day-col:last-child { margin-right: 0; }
    .day-col h2 { font-size: 1.25rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 35px; opacity: 0.9; }
    .course-item { margin-bottom: 30px; }
    .course-type { font-size: 0.9rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1.5px; margin-bottom: 6px; }
    .course-main { font-size: 1.98rem; font-weight: 400; color: #f8fafc; line-height: 1.3; } 
    .course-sides { font-size: 1.17rem; color: #94a3b8; margin-top: 8px; font-weight: 300; } 
    .empty-menu { font-size: 1.62rem; color: #94a3b8; font-weight: 300; font-style: italic; } 
    
    /* KALENTERI */
    .cal-day-group { margin-bottom: 40px; }
    .cal-date-header { font-size: 1.17rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: 600; }
    .cal-event-row { display: flex; align-items: baseline; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .cal-event-row:last-child { border-bottom: none; padding-bottom: 0; }
    .cal-time { font-size: 1.62rem; font-weight: 500; color: #f8fafc; width: 140px; flex-shrink: 0; } 
    .cal-title { font-size: 1.62rem; font-weight: 300; color: #cbd5e1; line-height: 1.4; } 

    .iframe-wrapper { width: 100%; height: 100%; padding: 0; margin: 0; background: #000; }
    iframe { width: 100%; height: 100%; border: none; }
    
    /* PALLOT UUDELLA TYYLILLÄ */
    #pagination {
      position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
      display: flex; justify-content: center; z-index: 1000;
      background: rgba(0, 0, 0, 0.2); padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.01);
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255, 255, 255, 0.15); transition: all 0.4s ease; margin: 0 5px; }
    .dot.active { background: rgba(56, 189, 248, 0.5); transform: scale(1.4); }
  </style>
</head>
<body>
  <div id="header">
    <div class="title">TERVETULOA MÄRSKYYN</div>
    <div id="ticker-container"><div class="ticker-text" id="ticker-text"></div></div>
    <div id="clock">Kello...</div>
  </div>

  <div id="slides-container"></div>
  <div id="pagination" style="display: none;"></div>

  <script>
    var WORKER_URL = 'https://infotv.jhaapako.workers.dev';
    var GAS_SLIDES_URL = 'https://script.google.com/macros/s/AKfycbyuIPNC_UoUmJpO4z7cJqoc9eReWaxbMribhjHoynqAHIMopCinCHzgtowOUslEXGGG2Q/exec';
    var SLIDES_ID = '1Yw-JktMPoenOfCkDxZO99YCLLNEcpcmUN3KO2ez6BjU';
    
    var INFO_DURATION = 8000; 
    var SLIDE_DURATION = 12000; 

    var timeline = [];
    var currentStep = 0;
    var timer = null;
    var slideCountId = 1;
    var iframeCreated = false;
    var gasData = null; // Tallennetaan GASin hidas vastaus tänne

    function updateClock() {
      var now = new Date();
      var days = ['Sunnuntai', 'Maanantai', 'Tiistai', 'Keskiviikko', 'Torstai', 'Perjantai', 'Lauantai'];
      var dateStr = days[now.getDay()] + ' ' + now.getDate() + '.' + (now.getMonth() + 1) + '.' + now.getFullYear();
      var h = now.getHours(); var m = now.getMinutes();
      document.getElementById('clock').textContent = dateStr + '   ' + (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m);
    }
    setInterval(updateClock, 1000); updateClock();

    function ajaxGet(url, responseType, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            if (responseType === 'json') {
              try { callback(null, JSON.parse(xhr.responseText)); } catch(e) { callback(e, null); }
            } else { callback(null, xhr.responseText); }
          } else { callback(new Error('HTTP Error'), null); }
        }
      };
      xhr.send();
    }

    function createSlideHtml(title, htmlContent) {
      var id = 'slide-gen-' + slideCountId;
      var container = document.getElementById('slides-container');
      container.insertAdjacentHTML('beforeend', '<div class="view-slide" id="' + id + '"><div class="content"><h1>' + title + '</h1>' + (htmlContent || '<div class="empty-menu">Ei sisältöä.</div>') + '</div></div>');
      timeline.push({ id: id, duration: INFO_DURATION, type: 'info' });
      slideCountId++;
    }

    // --- RUOKALISTA (LYHENNETTY) ---
    function formatMeal(rawString, typeName) {
      if (!rawString || rawString.trim() === '') return null;
      var parts = rawString.replace(/\([A-ZÄÖa-zäö,\s]*\)/g, '').trim().replace(/\s+/g, ' ').split(',');
      if (parts.length === 0 || parts[0].trim() === "") return null;
      var sidesArr = []; for(var i = 1; i < parts.length; i++) { if (parts[i].trim() !== '') sidesArr.push(parts[i].trim()); }
      return '<div class="course-item"><div class="course-type">' + typeName + '</div><div class="course-main">' + parts[0].trim() + '</div>' + (sidesArr.length > 0 ? '<div class="course-sides">' + sidesArr.join(', ') + '</div>' : '') + '</div>';
    }

    function buildMenuSlides(jsonData) {
      var now = new Date(); var tomorrow = new Date(); tomorrow.setDate(now.getDate() + 1);
      var todayStr = now.getDate() + '.' + (now.getMonth() + 1) + '.';
      var tomorrowStr = tomorrow.getDate() + '.' + (tomorrow.getMonth() + 1) + '.';
      var tObj = { lunch: null, veg: null, dinner: null }; var tmObj = { lunch: null, veg: null, dinner: null };
      var daysArray = (jsonData && jsonData.result && jsonData.result.pageContext && jsonData.result.pageContext.menu) ? jsonData.result.pageContext.menu.Days : [];

      function parseDay(datePattern, targetObj) {
        var dayData = null;
        for (var i = 0; i < daysArray.length; i++) { if (daysArray[i].Date && daysArray[i].Date.indexOf(datePattern) !== -1) { dayData = daysArray[i]; break; } }
        if (!dayData || !dayData.Meals) return;
        for (var j = 0; j < dayData.Meals.length; j++) {
          var type = (dayData.Meals[j].MealType || "").toLowerCase(); var name = dayData.Meals[j].Name || "";
          if (type.indexOf('kasvis') !== -1) targetObj.veg = formatMeal(name, 'Kasvislounas');
          else if (type.indexOf('päivällinen') !== -1 || type.indexOf('iltaruoka') !== -1) targetObj.dinner = formatMeal(name, 'Päivällinen');
          else if (type.indexOf('lounas') !== -1 || !targetObj.lunch) targetObj.lunch = formatMeal(name, 'Lounas');
        }
      }
      parseDay(todayStr, tObj); parseDay(tomorrowStr, tmObj);

      var html = '<div class="menu-grid"><div class="day-col"><h2>Tänään</h2>';
      var tFood = tObj.lunch || tObj.veg || tObj.dinner;
      if (tFood) html += (tObj.lunch||'') + (tObj.veg||'') + (tObj.dinner||''); else html += '<div class="empty-menu">Ei tallennettua ruokalistaa tälle päivälle.</div>';
      html += '</div><div class="day-col"><h2>Huomenna</h2>';
      var tmFood = tmObj.lunch || tmObj.veg || tmObj.dinner;
      if (tmFood) html += (tmObj.lunch||'') + (tmObj.veg||'') + (tmObj.dinner||''); else html += '<div class="empty-menu">Huomisen ruokalistaa ei ole julkaistu.</div>';
      html += '</div></div>';
      createSlideHtml('Päivän Ruokalista', html);
    }

    // --- KALENTERI (LYHENNETTY) ---
    function formatDayKey(dateObj) {
      var daysArr = ['Sunnuntai', 'Maanantai', 'Tiistai', 'Keskiviikko', 'Torstai', 'Perjantai', 'Lauantai'];
      var monthsArr = ['tammi', 'helmi', 'maalis', 'huhti', 'touko', 'kesä', 'heinä', 'elo', 'syys', 'loka', 'marras', 'joulu'];
      return daysArr[dateObj.getDay()] + ' ' + dateObj.getDate() + '. ' + monthsArr[dateObj.getMonth()];
    }

    function buildCalendarSlides(icalText) {
      var events = []; var alerts = [];
      var now = new Date(); var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var cy = now.getFullYear(); var cm = now.getMonth(); var cd = now.getDate();
      var tDate = new Date(); tDate.setDate(now.getDate() + 1); var ty = tDate.getFullYear(); var tm = tDate.getMonth(); var td = tDate.getDate();

      var blocks = icalText.split('BEGIN:VEVENT');
      for (var i = 1; i < blocks.length; i++) {
        var summaryMatch = blocks[i].match(/SUMMARY(?:;[^:]*)?:([^\r\n]*)/i); var dtstartMatch = blocks[i].match(/DTSTART(?:;[^:]*)?:([^\r\n]*)/i); var locMatch = blocks[i].match(/LOCATION(?:;[^:]*)?:([^\r\n]*)/i);
        if (!summaryMatch || !dtstartMatch) continue;
        var fullTitle = summaryMatch[1].trim().replace(/\\n|\\,/g, ' '); var dtstart = dtstartMatch[1]; var loc = locMatch ? locMatch[1].trim().substring(0, 25) : '';
        var eDate = null; var timeStr = ''; var isToday = false; var isTom = false;

        if (dtstart.length === 8) {  
          var y1 = parseInt(dtstart.substr(0,4), 10); var m1 = parseInt(dtstart.substr(4,2), 10) - 1; var d1 = parseInt(dtstart.substr(6,8), 10);
          eDate = new Date(y1, m1, d1, 12, 0, 0); isToday = (y1 === cy && m1 === cm && d1 === cd); isTom = (y1 === ty && m1 === tm && d1 === td);
        } else if (dtstart.indexOf('T') !== -1) {  
          var p = dtstart.split('T'); var y2 = parseInt(p[0].substr(0,4), 10); var m2 = parseInt(p[0].substr(4,2), 10) - 1; var d2 = parseInt(p[0].substr(6,2), 10);
          eDate = new Date(y2, m2, d2); if (p[1].length >= 4) timeStr = p[1].substr(0,2) + ':' + p[1].substr(2,2);
          isToday = (y2 === cy && m2 === cm && d2 === cd); isTom = (y2 === ty && m2 === tm && d2 === td);
        }
        if (!eDate || isNaN(eDate.getTime()) || (eDate < todayStart && !isToday)) continue;
        if (fullTitle.toUpperCase().indexOf('TIEDOTE:') === 0) { if (isToday) alerts.push(fullTitle.substring(8).trim()); continue; }
        events.push({ date: eDate, title: fullTitle.substring(0,50), time: timeStr, location: loc, isToday: isToday, isTomorrow: isTom });
      }

      events.sort(function(a, b) { return a.date - b.date; });

      if (alerts.length > 0) {
        document.getElementById('ticker-container').style.display = 'flex';
        var baseText = alerts.join(' /// '); var repArr = []; for (var a = 0; a < 8; a++) repArr.push(baseText);
        document.getElementById('ticker-text').textContent = repArr.join('   ///   ');
      }

      if (events.length === 0) { createSlideHtml('Seuraavat Tapahtumat', '<div class="empty-menu">Ei tulevia tapahtumia tiedossa.</div>'); return; }

      var tod = []; var tom = []; var lat = [];
      for (var e = 0; e < events.length; e++) {
          if (events[e].isToday) tod.push(events[e]); else if (events[e].isTomorrow) tom.push(events[e]); else { events[e].dayKey = formatDayKey(events[e].date); lat.push(events[e]); }
      }

      function renderDayGroup(headerText, arr) {
          if (arr.length === 0) return '';
          var gHtml = '<div class="cal-day-group"><div class="cal-date-header">' + headerText + '</div>';
          for (var idx = 0; idx < arr.length; idx++) {
              var timeDisp = arr[idx].time || 'Koko pv'; var locDisp = arr[idx].location ? ' (' + arr[idx].location + ')' : '';
              gHtml += '<div class="cal-event-row"><div class="cal-time">' + timeDisp + '</div><div class="cal-title">' + arr[idx].title + locDisp + '</div></div>';
          }
          return gHtml + '</div>';
      }

      var p1 = ''; if (tod.length > 0) p1 += renderDayGroup('Tänään', tod); if (tom.length > 0) p1 += renderDayGroup('Huomenna', tom);
      if (p1 !== '') createSlideHtml('Tapahtumat: Tänään & Huomenna', p1);

      if (lat.length > 0) {
          var grouped = {}; var order = []; 
          for (var le = 0; le < lat.length; le++) { if (!grouped[lat[le].dayKey]) { grouped[lat[le].dayKey] = []; order.push(lat[le].dayKey); } grouped[lat[le].dayKey].push(lat[le]); }
          var cHtml = ''; var rows = 0; var maxS = 2; var sC = 0;
          for (var dk = 0; dk < order.length; dk++) {
              if (sC >= maxS) break;
              var dEvs = grouped[order[dk]]; var rNeed = dEvs.length + 1; 
              if (rows + rNeed > 14 && cHtml !== '') { createSlideHtml('Seuraavat Tapahtumat', cHtml); sC++; cHtml = ''; rows = 0; if (sC >= maxS) break; }
              cHtml += renderDayGroup(order[dk], dEvs); rows += rNeed;
          }
          if (cHtml !== '' && sC < maxS) createSlideHtml('Seuraavat Tapahtumat', cHtml);
      }
    }

    // --- PÄÄOHJELMA JA "NOPEA ALOITUS" ---
    var menuReady = false;
    var calReady = false;

    // Päivittää pallot alareunaan reaaliajassa
    function updatePagination() {
      var pagination = document.getElementById('pagination');
      var dotsHtml = '';
      for (var p = 0; p < timeline.length; p++) {
        dotsHtml += '<div class="dot ' + (p === currentStep ? 'active' : '') + '"></div>';
      }
      pagination.innerHTML = dotsHtml;
      if (timeline.length > 0) pagination.style.display = 'flex';
    }

    function startShow() {
      if (timeline.length === 0) return; // Jos dataa ei ole tullut, ei tehdä mitään vielä
      updatePagination();
      playTimeline(0);
    }

    function checkFastStart() {
      // Aloita sivu VÄLITTÖMÄSTI kun ruoka ja kalenteri on haettu
      if (menuReady && calReady) {
        startShow();
      }
    }

    function playTimeline(index) {
      if (index >= timeline.length) {
        window.location.reload();
        return;
      }
      
      currentStep = index;
      var step = timeline[currentStep];

      // JOS VUOROSSA ON GOOGLE SLIDES
      if (step.type === 'gslides') {
        // Luodaan iFrame vasta kun on Google Slidesin vuoro, jotta se lähtee oikeasti pyörimään TÄSTÄ hetkestä!
        if (!iframeCreated) {
          var iframeUrl = 'https://docs.google.com/presentation/d/' + SLIDES_ID + '/embed?start=true&loop=false&delayms=' + SLIDE_DURATION + '&rm=minimal';
          var container = document.getElementById('slides-container');
          container.insertAdjacentHTML('beforeend', '<div class="view-slide iframe-wrapper" id="slide-gslides"><iframe src="' + iframeUrl + '" allowfullscreen></iframe></div>');
          iframeCreated = true;
        }
      }

      var activeSlide = document.querySelector('.view-slide.active');
      if (activeSlide && activeSlide.id !== step.id) {
        activeSlide.classList.remove('active');
      }
      var nextSlideEl = document.getElementById(step.id);
      if (nextSlideEl) nextSlideEl.classList.add('active');

      updatePagination();

      if (timer) clearTimeout(timer);
      timer = setTimeout(function() {
        playTimeline(currentStep + 1);
      }, step.duration);
    }

    // --- TIETOJEN HAKU ---
    
    // 1. Menu (Nopea)
    ajaxGet(WORKER_URL + '/menu', 'json', function(err, data) {
      if (data && !data.error) buildMenuSlides(data);
      else createSlideHtml('Päivän Ruokalista', '<div class="empty-menu">Ruokalistaa ei saatu ladattua.</div>');
      menuReady = true;
      checkFastStart();
    });

    // 2. Kalenteri (Nopea)
    ajaxGet(WORKER_URL + '/calendar', 'text', function(err, data) {
      if (data) buildCalendarSlides(data);
      else createSlideHtml('Tulevat Tapahtumat', '<div class="empty-menu">Kalenteri ei ole saatavilla.</div>');
      calReady = true;
      checkFastStart();
    });

    // 3. GAS (Hidas) - Hakee datan taustalla, lisää sen timelineen lennosta!
    ajaxGet(GAS_SLIDES_URL, 'json', function(err, data) {
      var slidesCount = (data && data.slideCount) ? data.slideCount : 5;
      
      for (var i = 0; i < slidesCount; i++) {
        timeline.push({ id: 'slide-gslides', duration: SLIDE_DURATION, type: 'gslides' });
      }
      
      // Päivitä pallot alareunaan, jos show on jo käynnissä
      updatePagination();
    });

    // Fallback: lataa sivu uusiksi 2 minuutin päästä, jos jokin meni fataalisti jumiin verkossa
    setTimeout(function() {
      if (timeline.length === 0) window.location.reload();
    }, 120000);

  </script>
</body>
</html>
