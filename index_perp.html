<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mäkelänrinteen lukio - Info-TV</title>
  <style>
    /* MODERNI JA AMMATTIMAINEN ULKOASU (16:9 optimoitu) */
    :root {
      --bg-color: #0b1120;
      --panel-bg: rgba(255, 255, 255, 0.05);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --header-height: 80px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html { 
      height: 100vh; 
      width: 100vw;
      background-color: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; 
      color: var(--text-main); 
    }
    
    /* Yläpalkki */
    #header { 
      position: absolute; 
      top: 0; 
      width: 100%; 
      height: var(--header-height); 
      background: #020617; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 50px; 
      z-index: 1000;
      border-bottom: 1px solid #1e293b;
    }
    
    .title { 
      font-size: 2rem; 
      font-weight: 500; 
      color: var(--text-main);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    #clock { 
      font-size: 1.8rem; 
      font-weight: 400; 
      color: var(--text-muted); 
    }
    
    /* Näkymien asettelu (16:9 pohja) */
    .view { 
      display: none; 
      width: 100%; 
      height: 100vh; 
      padding-top: var(--header-height); 
    }
    .view.active { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
    }
    
    /* Sisältölaatikot */
    .content { 
      background: var(--panel-bg);
      border: 1px solid #1e293b;
      margin: 0 auto; 
      padding: 60px; 
      border-radius: 16px; 
      width: 85%; 
      max-width: 1600px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
    }
    
    h1 { 
      font-size: 3rem; 
      margin-bottom: 50px; 
      text-align: left; 
      color: var(--accent);
      font-weight: 300;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 20px;
    }
    
    .data-item { 
      font-size: 2.2rem; 
      margin: 25px 0; 
      padding: 20px 30px; 
      background: rgba(255,255,255,0.03); 
      border-radius: 8px; 
      border-left: 4px solid var(--accent);
      font-weight: 300;
      line-height: 1.4;
    }
    
    strong { font-weight: 600; color: #fff; }
    
    /* Google Slides Iframe - Alapalkin piilotus */
    /* Tehdään iframesta hieman ruutua isompi ja nostetaan sitä ylöspäin alapalkin piilottamiseksi */
    #slides-container {
      width: 100%;
      height: calc(100vh - var(--header-height));
      overflow: hidden;
      position: relative;
    }
    
    #slides-iframe { 
      width: 100%; 
      /* Nostetaan korkeutta 40px verran, jotta Google-palkki jää piiloon "leikkauksen" alle */
      height: calc(100% + 40px); 
      border: none; 
      position: absolute;
      top: 0;
      left: 0;
    }
    
    .loading { text-align: center; font-size: 2rem; color: var(--text-muted); font-weight: 300; }
  </style>
</head>
<body>
  <div id="header">
    <div class="title">Mäkelänrinteen lukio</div>
    <div id="clock">Kello käynnistyy...</div>
  </div>

  <div id="view-menu" class="view">
    <div class="content">
      <h1>Päivän lounas</h1>
      <div id="menu-data" class="loading">Ladataan ruokalistaa...</div>
    </div>
  </div>

  <div id="view-calendar" class="view">
    <div class="content">
      <h1>Tulevat tapahtumat</h1>
      <div id="calendar-data" class="loading">Ladataan kalenteria...</div>
    </div>
  </div>

  <div id="view-slides" class="view" style="display: none;">
    <div id="slides-container">
      <iframe id="slides-iframe" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    // KONFIGURAATIO
    const WORKER_URL = 'https://infotv.jhaapako.workers.dev';
    const GAS_SLIDES_URL = 'https://script.google.com/macros/s/AKfycbyuIPNC_UoUmJpO4z7cJqoc9eReWaxbMribhjHoynqAHIMopCinCHzgtowOUslEXGGG2Q/exec';
    const SLIDES_ID = '1Yw-JktMPoenOfCkDxZO99YCLLNEcpcmUN3KO2ez6BjU';

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = 
        now.toLocaleDateString('fi-FI', {weekday: 'long', day: 'numeric', month: 'numeric', year: 'numeric'}) + 
        ' klo ' + now.toLocaleTimeString('fi-FI', {hour: '2-digit', minute: '2-digit'});
    }
    updateClock();
    setInterval(updateClock, 1000);

    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => {
        v.style.display = 'none';
        v.classList.remove('active');
      });
      const active = document.getElementById(viewId);
      if (viewId === 'view-slides') {
        active.style.display = 'block'; // Slides vaatii blockin iframea varten
      } else {
        active.style.display = 'flex';
        active.classList.add('active');
      }
    }

    async function loadMenu() {
      try {
        const res = await fetch(`${WORKER_URL}/menu`);
        if (!res.ok) throw new Error('Verkkovirhe');
        const data = await res.json();
        
        let html = '';
        if (data.lunch) html += `<div class="data-item"><strong>Lounas:</strong> ${data.lunch}</div>`;
        if (data.dinner && data.dinner !== 'Ei tietoa' && data.dinner !== 'Kasviswok') html += `<div class="data-item"><strong>Kasvislounas / Muu:</strong> ${data.dinner}</div>`;
        
        if (!html) html = '<div class="data-item">Ruokalista ei saatavilla tälle päivälle.</div>';
        
        document.getElementById('menu-data').innerHTML = html;
      } catch(e) {
        document.getElementById('menu-data').innerHTML = '<div class="data-item">Ruokalistaa ei saatu ladattua (verkkovirhe).</div>';
      }
    }

    async function loadCalendar() {
      try {
        const res = await fetch(`${WORKER_URL}/calendar`);
        if (!res.ok) throw new Error('Verkkovirhe');
        const events = await res.json();
        
        let html = '';
        if (Array.isArray(events) && events.length > 0) {
          html = events.map(e => {
            // Tehdään päivämääräriveistä hieman isompia kuin yksittäisistä tapahtumista
            if (e.title && !e.title.includes('⏰')) {
              return `<div style="font-size: 2.5rem; font-weight: 500; color: #fff; margin-top: 30px; margin-bottom: 10px;">${e.title}</div>`;
            }
            return `<div class="data-item" style="margin-left: 30px; font-size: 2rem;">${e.title}</div>`;
          }).join('');
        } else {
          html = '<div class="data-item">Ei tulevia tapahtumia tiedossa.</div>';
        }
        document.getElementById('calendar-data').innerHTML = html;
      } catch(e) {
        document.getElementById('calendar-data').innerHTML = '<div class="data-item">Kalenteri ei ole saatavilla.</div>';
      }
    }

    async function getSlidesDuration() {
      try {
        const res = await fetch(GAS_SLIDES_URL);
        const info = await res.json();
        return info.totalTime || 240000;
      } catch(e) {
        return 240000;
      }
    }

    async function runLoop() {
      await loadMenu();
      await loadCalendar();
      
      showView('view-menu'); 
      await new Promise(r => setTimeout(r, 20000));
      
      showView('view-calendar'); 
      await new Promise(r => setTimeout(r, 20000));
      
      const slidesTime = await getSlidesDuration();
      
      // rm=minimal piilottaa osan ohjaimista, iframe overflow-hidden CSS leikkaa loput
      document.getElementById('slides-iframe').src = 
        `https://docs.google.com/presentation/d/${SLIDES_ID}/embed?start=true&loop=false&delayms=6500&rm=minimal&t=${Date.now()}`;
      
      showView('view-slides'); 
      await new Promise(r => setTimeout(r, slidesTime));
      
      window.location.reload();
    }

    window.onload = function() {
      runLoop();
    };
  </script>
</body>
</html>
