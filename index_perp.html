<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info-TV • Mäkelänrinteen lukio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --bg-surface: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .slides-container {
            width: 100%;
            height: 100%;
            display: flex;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            height: 100%;
            padding: 2rem;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            animation: fadeIn 0.3s ease-in;
        }

        .slide.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slide::-webkit-scrollbar {
            width: 6px;
        }

        .slide::-webkit-scrollbar-track {
            background: transparent;
        }

        .slide::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }

        /* ===== RUOKALISTA SIVU ===== */
        .meals-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .meal-card {
            background: var(--bg-surface);
            border-radius: 12px;
            padding: 1.5rem;
            border-left: 4px solid var(--primary);
            transition: all 0.2s ease;
        }

        .meal-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .meal-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .meal-card .meal-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 0.8rem;
        }

        .meal-card .meal-sides {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .meal-empty {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.95rem;
        }

        .day-section {
            margin-bottom: 2rem;
        }

        .day-header {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
            text-transform: capitalize;
        }

        /* ===== KALENTERI SIVU ===== */
        .events-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .event-day {
            background: var(--bg-surface);
            border-radius: 12px;
            padding: 1.5rem;
            border-left: 4px solid var(--primary);
        }

        .event-day-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
            text-transform: capitalize;
        }

        .event-item {
            padding: 0.8rem 0;
            font-size: 0.95rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-time {
            color: var(--primary);
            font-weight: 600;
            min-width: 60px;
            font-size: 0.9rem;
        }

        .event-title {
            flex: 1;
        }

        .event-location {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .no-events {
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
            font-style: italic;
        }

        /* ===== OTSIKKO ===== */
        .slide-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== PAGINOINTI ===== */
        .pagination {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 100;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        .dot.active {
            background: var(--primary);
            opacity: 1;
            transform: scale(1.3);
        }

        /* ===== ALERT PALKKI ===== */
        .alerts-section {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(249, 115, 22, 0.1));
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #ef4444;
        }

        .alerts-section h4 {
            color: #fca5a5;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .alerts-section p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .meals-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="slides-container">
        <!-- SIVU 1: RUOKALISTA -->
        <div class="slide active">
            <h1 class="slide-title">🍽️ Tämän viikon ruokalista</h1>
            
            <div class="day-section">
                <h2 class="day-header">Tänään</h2>
                <div class="meals-container">
                    <div class="meal-card">
                        <h3>Lounas</h3>
                        <div class="meal-name" id="today-lunch">Ladataan...</div>
                        <div class="meal-sides" id="today-lunch-sides"></div>
                    </div>
                    <div class="meal-card">
                        <h3>Kasvisvaihtoehto</h3>
                        <div class="meal-name" id="today-veg">Ladataan...</div>
                        <div class="meal-sides" id="today-veg-sides"></div>
                    </div>
                </div>
            </div>

            <div class="day-section">
                <h2 class="day-header">Huomenna</h2>
                <div class="meals-container">
                    <div class="meal-card">
                        <h3>Lounas</h3>
                        <div class="meal-name" id="tomorrow-lunch">Ladataan...</div>
                        <div class="meal-sides" id="tomorrow-lunch-sides"></div>
                    </div>
                    <div class="meal-card">
                        <h3>Kasvisvaihtoehto</h3>
                        <div class="meal-name" id="tomorrow-veg">Ladataan...</div>
                        <div class="meal-sides" id="tomorrow-veg-sides"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SIVU 2: KALENTERI -->
        <div class="slide">
            <h1 class="slide-title">📅 Seuraavat tapahtumat</h1>
            
            <div id="alerts-container"></div>
            <div class="events-container" id="events-container">
                <div class="no-events">Ladataan kalenteria...</div>
            </div>
        </div>
    </div>

    <!-- PAGINOINTI -->
    <div class="pagination">
        <div class="dot active" data-slide="0"></div>
        <div class="dot" data-slide="1"></div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');

        const showSlide = (n) => {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[n].classList.add('active');
            dots[n].classList.add('active');
            currentSlide = n;
        };

        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                showSlide(parseInt(e.target.dataset.slide));
            });
        });

        // Automaattinen siirtyminen sivujen välillä 15 sekunnin välein
        setInterval(() => {
            showSlide((currentSlide + 1) % slides.length);
        }, 15000);

        // Parseri ruokakortin muotoon
        const parseFood = (html) => {
            if (!html) return { name: '—', sides: '' };
            const div = document.createElement('div');
            div.innerHTML = html;
            const text = div.textContent || div.innerText || '';
            const parts = text.split('\n').filter(p => p.trim());
            return {
                name: parts[0] || '—',
                sides: parts.slice(1).join(', ')
            };
        };

        // Hae ruokalista
        const loadMeals = async () => {
            try {
                const res = await fetch('/menu');
                const data = await res.json();

                ['today', 'tomorrow'].forEach(day => {
                    const dayData = data[day];
                    const dayPrefix = day === 'today' ? 'today' : 'tomorrow';
                    
                    // Lounas
                    if (dayData.lunch) {
                        const meal = parseFood(dayData.lunch);
                        document.getElementById(`${dayPrefix}-lunch`).textContent = meal.name;
                        document.getElementById(`${dayPrefix}-lunch-sides`).textContent = meal.sides;
                    } else {
                        document.getElementById(`${dayPrefix}-lunch`).textContent = '—';
                    }

                    // Kasvis
                    if (dayData.vegetarian) {
                        const meal = parseFood(dayData.vegetarian);
                        document.getElementById(`${dayPrefix}-veg`).textContent = meal.name;
                        document.getElementById(`${dayPrefix}-veg-sides`).textContent = meal.sides;
                    } else {
                        document.getElementById(`${dayPrefix}-veg`).textContent = '—';
                    }
                });
            } catch (e) {
                console.error('Ruokalista virhe:', e);
            }
        };

        // Hae kalenteri
        const loadCalendar = async () => {
            try {
                const res = await fetch('/calendar');
                const data = await res.json();

                const container = document.getElementById('events-container');
                const alertsContainer = document.getElementById('alerts-container');

                // Näytä hälytykset
                if (data.alerts && data.alerts.length > 0) {
                    alertsContainer.innerHTML = `
                        <div class="alerts-section">
                            <h4>⚠️ Tärkeä tiedote</h4>
                            <p>${data.alerts.join('<br>')}</p>
                        </div>
                    `;
                }

                // Näytä tapahtumat
                if (data.events && data.events.length > 0) {
                    container.innerHTML = data.events.map(event => {
                        if (event.title.endsWith(':')) {
                            // Päivän otsikko
                            return `<div class="event-day-title">${event.title}</div>`;
                        } else if (event.title.startsWith('  ⏰')) {
                            // Tapahtuma
                            return `<div class="event-item"><span class="event-time">${event.title.substring(0, 15)}</span><span class="event-title">${event.title.substring(15)}</span></div>`;
                        }
                        return '';
                    }).join('');
                } else {
                    container.innerHTML = '<div class="no-events">Ei tapahtumia seuraavan 7 päivän aikana.</div>';
                }
            } catch (e) {
                console.error('Kalenteri virhe:', e);
            }
        };

        // Lataa data käynnistäessä ja päivitä 5 min välein
        loadMeals();
        loadCalendar();
        setInterval(loadMeals, 5 * 60 * 1000);
        setInterval(loadCalendar, 5 * 60 * 1000);
    </script>
</body>
</html>
